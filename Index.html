    html { scroll-behavior: smooth; }

    .hero-roles span { color: var(--accent); }

    section { padding: 7rem 3.5rem; border-top: 1px solid rgba(255,255,255,0.07); }

    .card { border-radius: 999px; border: 1px solid rgba(255,255,255,0.1); padding: 3rem 3.5rem; display: flex; flex-direction: column; gap: 1.2rem; background: rgba(255,255,255,0.02); transition: background 0.3s, border-color 0.3s, transform 0.3s; text-decoration: none; color: inherit; position: relative; overflow: hidden; }
    .card:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); transform: translateY(-3px); }
    .card-tag { font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); }
    .card-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 400; line-height: 1.1; color: var(--white); }
    .card-desc { font-size: 0.82rem; line-height: 1.7; color: var(--mid); max-width: 28ch; }

    .contact-sub { font-size: 0.82rem; color: var(--mid); max-width: 40ch; line-height: 1.7; }

    .contact-email::after { content: '↗'; }
